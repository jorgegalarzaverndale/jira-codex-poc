name: Claude Code Auto-Fix from Jira

on:
  repository_dispatch:
    types: [jira-ai-fix]

permissions:
  contents: write
  pull-requests: write

jobs:
  claude-fix:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JIRA_ASSIGNEE_ACCOUNT_ID: ${{ secrets.JIRA_ASSIGNEE_ACCOUNT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract Jira ticket info
        id: ticket
        run: |
          echo "title=${{ github.event.client_payload.title }}" >> $GITHUB_OUTPUT
          echo "key=${{ github.event.client_payload.key }}" >> $GITHUB_OUTPUT

      - name: Create branch
        run: |
          BRANCH="claude/fix-${{ steps.ticket.outputs.key }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run Claude Code to fix the issue
        id: claude
        run: |
          set +e
          OUTPUT=$(claude -p "Jira ticket ${{ steps.ticket.outputs.key }}: ${{ steps.ticket.outputs.title }}

          Description: ${{ github.event.client_payload.description }}

          Instructions:
          1. Read the file operations.md
          2. Find the wrong result described in the ticket
          3. Fix only that specific result
          4. Do not change anything else" \
            --allowedTools "Edit,Read,Write" \
            --dangerously-skip-permissions 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Save output to file for the Jira comment
          echo "$OUTPUT" > /tmp/claude-output.txt
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Claude Code failed with exit code $EXIT_CODE"
            echo "Output: $OUTPUT"
          fi

      - name: Commit and push
        if: steps.claude.outputs.exit_code == '0'
        id: push
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "fix: ${{ steps.ticket.outputs.key }} - ${{ steps.ticket.outputs.title }}"
            git push origin "$BRANCH"
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.claude.outputs.exit_code == '0' && steps.push.outputs.no_changes != 'true'
        id: pr
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "fix: ${{ steps.ticket.outputs.key }} - ${{ steps.ticket.outputs.title }}" \
            --body "## Automated fix by Claude Code

          **Jira ticket:** ${{ steps.ticket.outputs.key }}
          **Summary:** ${{ steps.ticket.outputs.title }}

          ---

          This PR was automatically generated by Claude Code in response to a Jira ticket.
          Please review the changes and merge if correct." \
            --reviewer jorgegalarzaverndale)
          echo "url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment success on Jira ticket
        if: steps.pr.outputs.url
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":{\"version\":1,\"type\":\"doc\",\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Claude Code has automatically fixed this issue.\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"PR: ${{ steps.pr.outputs.url }}\"}]}]}}" \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${{ steps.ticket.outputs.key }}/comment"

      - name: Transition Jira ticket to Code Review
        if: steps.pr.outputs.url
        env:
          ISSUE_KEY: ${{ steps.ticket.outputs.key }}
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"3"}}' \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${ISSUE_KEY}/transitions"
          curl -s -X PUT \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"fields\":{\"assignee\":{\"accountId\":\"${JIRA_ASSIGNEE_ACCOUNT_ID}\"}}}" \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${ISSUE_KEY}"

      - name: Comment failure on Jira ticket
        if: steps.claude.outputs.exit_code != '0'
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":{\"version\":1,\"type\":\"doc\",\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Claude Code failed to fix this issue automatically. A developer will need to look at this manually.\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Check the GitHub Action logs for details.\"}]}]}}" \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${{ steps.ticket.outputs.key }}/comment"

      - name: Transition Jira ticket to In Progress (failure)
        if: steps.claude.outputs.exit_code != '0'
        env:
          ISSUE_KEY: ${{ steps.ticket.outputs.key }}
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"21"}}' \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${ISSUE_KEY}/transitions"
          curl -s -X PUT \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"fields\":{\"assignee\":{\"accountId\":\"${JIRA_ASSIGNEE_ACCOUNT_ID}\"}}}" \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${ISSUE_KEY}"

      - name: Comment no changes on Jira ticket
        if: steps.push.outputs.no_changes == 'true'
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\":{\"version\":1,\"type\":\"doc\",\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Claude Code analyzed the issue but made no changes. The issue may already be fixed or needs manual intervention.\"}]}]}}" \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${{ steps.ticket.outputs.key }}/comment"

      - name: Transition Jira ticket to In Progress (no changes)
        if: steps.push.outputs.no_changes == 'true'
        env:
          ISSUE_KEY: ${{ steps.ticket.outputs.key }}
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"21"}}' \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${ISSUE_KEY}/transitions"
          curl -s -X PUT \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"fields\":{\"assignee\":{\"accountId\":\"${JIRA_ASSIGNEE_ACCOUNT_ID}\"}}}" \
            "https://jgalarzah.atlassian.net/rest/api/3/issue/${ISSUE_KEY}"
